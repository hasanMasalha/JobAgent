<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<script src="https://cdn.tailwindcss.com"></script>
<title>Applications Mock</title>
</head>
<body class="bg-gray-50 p-8">
<div class="max-w-5xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">My Applications</h1>
  <div class="bg-white border rounded-xl overflow-hidden shadow-sm">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b bg-gray-50 text-gray-500 text-xs uppercase tracking-wide">
          <th class="text-left px-4 py-3 font-medium">Company</th>
          <th class="text-left px-4 py-3 font-medium">Role</th>
          <th class="text-left px-4 py-3 font-medium">Applied</th>
          <th class="text-left px-4 py-3 font-medium">Status</th>
          <th class="text-left px-4 py-3 font-medium">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <!-- Applied row -->
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-3 font-medium text-gray-900">Google</td>
          <td class="px-4 py-3 text-gray-700">Software Engineer</td>
          <td class="px-4 py-3 text-gray-500 whitespace-nowrap">1 May 2026</td>
          <td class="px-4 py-3">
            <select class="text-xs font-semibold px-2.5 py-1 rounded-full border-0 bg-blue-100 text-blue-700">
              <option>Applied</option>
            </select>
          </td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-2">
              <a href="#" class="text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap">View job ↗</a>
              <span class="text-gray-200 select-none">|</span>
              <button class="text-emerald-600 hover:text-emerald-700 font-medium whitespace-nowrap">CV ↓</button>
              <span class="text-gray-200 select-none">|</span>
              <button class="text-gray-400 hover:text-red-500 whitespace-nowrap">Delete</button>
            </div>
          </td>
        </tr>
        <!-- Failed / manual apply row -->
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-3 font-medium text-gray-900">Meta</td>
          <td class="px-4 py-3 text-gray-700">Frontend Developer</td>
          <td class="px-4 py-3 text-gray-500 whitespace-nowrap">1 May 2026</td>
          <td class="px-4 py-3">
            <select class="text-xs font-semibold px-2.5 py-1 rounded-full border-0 bg-orange-100 text-orange-600">
              <option>Manual apply needed</option>
            </select>
          </td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-2">
              <a href="#" class="text-xs font-semibold bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 rounded-lg whitespace-nowrap">Apply now →</a>
              <span class="text-gray-200 select-none">|</span>
              <button class="text-gray-400 hover:text-red-500 whitespace-nowrap">Delete</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
