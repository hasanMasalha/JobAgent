<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
    }
    .header {
      background: #1a2e5e;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { color: white; font-size: 16px; font-weight: 600; }
    .content { padding: 16px; }
    .status-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-label { font-size: 11px; color: #666; margin-bottom: 4px; }
    .status-value { font-size: 14px; font-weight: 500; color: #1a2e5e; }
    .status-value.connected { color: #16a34a; }
    .status-value.disconnected { color: #dc2626; }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-primary { background: #1a2e5e; color: white; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary { background: #f5f6f8; color: #333; border: 1px solid #e0e0e0; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #f0f0f0;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
    .footer a { color: #1a2e5e; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>JobAgent</h1>
  </div>

  <div class="content">
    <div class="status-card">
      <div class="status-label">JobAgent Account</div>
      <div class="status-value" id="account-status">Checking...</div>
    </div>

    <div class="status-card">
      <div class="status-label">LinkedIn</div>
      <div class="status-value" id="linkedin-status">Checking...</div>
    </div>

    <button class="btn btn-primary" id="connect-linkedin-btn" style="display:none">
      Connect LinkedIn
    </button>

    <button class="btn btn-primary" id="signin-btn" style="display:none">
      Sign in to JobAgent
    </button>

    <button class="btn btn-secondary" id="open-dashboard-btn">
      Open Dashboard
    </button>
  </div>

  <div class="footer">
    <a href="https://jobagent.uk" target="_blank">jobagent.uk</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
