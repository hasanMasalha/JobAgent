name: Daily Scrape

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  scrape:
    name: Daily Job Scrape
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Scrape LinkedIn and Indeed jobs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 55m
          script: |
            echo "Starting LinkedIn/Indeed scrape..."
            curl -s -X POST http://localhost:8000/scrape-and-store \
              --max-time 3000 \
              && echo "LinkedIn/Indeed scrape completed" \
              || echo "LinkedIn/Indeed scrape failed or timed out"

      - name: Scrape company careers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            echo "Starting company careers scrape..."
            curl -s -X POST http://localhost:8000/companies/scrape-and-store \
              --max-time 1000 \
              && echo "Company careers scrape completed" \
              || echo "Company careers scrape failed or timed out"
