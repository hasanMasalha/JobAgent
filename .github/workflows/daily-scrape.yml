name: Daily Scrape

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  scrape:
    name: Daily Job Scrape
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Trigger scrape on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 55m
          command_timeout: 55m
          script: |
            curl -s -X POST http://localhost:8000/scrape-and-store \
              --max-time 3000 \
              && echo "Scrape completed successfully" \
              || echo "Scrape failed or timed out"
