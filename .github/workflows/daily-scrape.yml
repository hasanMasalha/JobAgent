name: Daily Scrape

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  scrape:
    name: Daily Job Scrape
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Scrape LinkedIn and Indeed jobs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 55m
          script: |
            echo "Starting LinkedIn/Indeed scrape..."
            curl -s -X POST http://localhost:8000/scrape-and-store \
              --max-time 3000 \
              && echo "LinkedIn/Indeed scrape completed" \
              || echo "LinkedIn/Indeed scrape failed or timed out"

      - name: Scrape company careers (API-based only)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "Starting API company scrape (greenhouse/comeet/lever/ashby)..."
            curl -s -X POST http://localhost:8000/companies/scrape-api-only \
              --max-time 300 \
              && echo "API company scrape completed" \
              || echo "API company scrape failed or timed out"
